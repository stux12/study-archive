name: Notion 검수본 배포

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '미리보기만: 배포 대상 글 목록을 로그에 출력하고 실제 배포는 하지 않습니다.'
        required: true
        type: boolean
        default: false
      sync_notion:
        description: 'Notion의 Published 글을 먼저 동기화합니다.'
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - id: pages
        uses: actions/configure-pages@v6
      - name: Notion 동기화 / 배포 대상 미리보기
        if: ${{ inputs.dry_run || inputs.sync_notion }}
        run: npm run sync:notion ${{ inputs.dry_run && '-- --dry-run' || '' }}
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}
          NOTION_TITLE_PROPERTY: ${{ vars.NOTION_TITLE_PROPERTY || '제목' }}
          NOTION_STATUS_PROPERTY: ${{ vars.NOTION_STATUS_PROPERTY || '상태' }}
          NOTION_TAGS_PROPERTY: ${{ vars.NOTION_TAGS_PROPERTY || '태그' }}
          NOTION_CATEGORY_PROPERTY: ${{ vars.NOTION_CATEGORY_PROPERTY || '카테고리' }}
          NOTION_GROUP_PROPERTY: ${{ vars.NOTION_GROUP_PROPERTY || '분야' }}
          NOTION_SLUG_PROPERTY: ${{ vars.NOTION_SLUG_PROPERTY || '슬러그' }}
          NOTION_SUMMARY_PROPERTY: ${{ vars.NOTION_SUMMARY_PROPERTY || '요약' }}
          NOTION_DATE_PROPERTY: ${{ vars.NOTION_DATE_PROPERTY || '학습일' }}
      - name: 생성물 커밋 — 완료 글 보존(commit-back)
        if: ${{ !inputs.dry_run && inputs.sync_notion }}
        run: |
          git config user.name "stux12"
          git config user.email "74259794+stux12@users.noreply.github.com"
          git add src/content/posts
          [ -d src/assets/posts ] && git add src/assets/posts || true
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore(sync): Notion 발행 결과 반영"
            git push
          fi
      - name: 사이트 빌드
        if: ${{ !inputs.dry_run }}
        run: npm run build
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          SITE_URL: https://${{ github.repository_owner }}.github.io
      - uses: actions/upload-pages-artifact@v5
        if: ${{ !inputs.dry_run }}
        with:
          path: ./dist
  deploy:
    needs: build
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
